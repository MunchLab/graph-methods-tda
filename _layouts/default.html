<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <script type="text/javascript" async
    src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=default">
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-text">
        <h1 class="site-title">{{ site.title }}</h1>
        <p class="site-subtitle">{{ site.description }}</p>
        <p class="site-meta">📅 DATE TBD &nbsp;&nbsp; 📍 LOCATION TBD</p>
      </div>
    </div>
  </header>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Home</a>
      <a href="{{ '/speakers' | relative_url }}" class="nav-link {% if page.url contains 'speakers' %}active{% endif %}">Speakers</a>
      <a href="{{ '/program' | relative_url }}" class="nav-link {% if page.url contains 'program' %}active{% endif %}">Program</a>
      <a href="{{ '/registration' | relative_url }}" class="nav-link {% if page.url contains 'registration' %}active{% endif %}">Registration</a>
      <a href="{{ '/dates' | relative_url }}" class="nav-link {% if page.url contains 'dates' %}active{% endif %}">Important Dates</a>
      <a href="{{ '/directions' | relative_url }}" class="nav-link {% if page.url contains 'directions' %}active{% endif %}">Directions</a>
    </div>
  </nav>

  <main class="site-main">
    <div class="content-wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; {{ site.title }} &nbsp;|&nbsp; Contact: <a href="mailto:{{ site.contact_email }}">{{ site.contact_email }}</a></p>
    </div>
  </footer>

</body>
</html>
